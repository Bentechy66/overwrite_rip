<html>
    <style>
        .puzzle {
            min-width: 80%;
        }

        .cell {
            margin: 10px;
            width: 100%;
            height: 20vh;
        }

        .r {
            background-color: red;
        }

        .g {
            background-color: green;
        }

        .y {
            background-color: yellow;
        }

        .grid {
            display: flex;
            flex-direction: column;
        }

        .row {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
        }
    </style>
    <div class="puzzle">
        <div id="grid">
            <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
            <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
            <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        </div>
    </div>

    <h1>rules</h1>
    <ul>
        <li>clicking a green square does... nothing!</li>
        <li>clicking a red square toggles orthogonally connected squares between green and red</li>
        <li>clicking a yellow square shifts the entire row it is in one to the right</li>
    </ul>

    <script>
        let grid_current = [
            ["y", "r", "g"],
            ["r", "y", "r"],
            ["g", "r", "y"]
        ]

        let height = 3;
        let width = 3;

        const getCellValue = (x, y) => {
            if (x < 0 || x >= width)  { return 'e'; }
            if (y < 0 || y >= height) { return 'e'; }

            return grid_current[y][x];
        }

        const setCellValue = (x, y, new_v) => {
            grid_current[y][x] = new_v;
        }

        const cellClick = (x, y) => {
            let currentCell = getCellValue(x, y);

            if (currentCell == "r") {
                // swap orthogonally connected green cells to red // red cells to green
                if (getCellValue(x + 1, y + 0) == "g") { setCellValue(x + 1, y + 0, "r") } else if (getCellValue(x + 1, y + 0) == "r") { setCellValue(x + 1, y + 0, "g") }
                if (getCellValue(x + 0, y + 1) == "g") { setCellValue(x + 0, y + 1, "r") } else if (getCellValue(x + 0, y + 1) == "r") { setCellValue(x + 0, y + 1, "g") }
                if (getCellValue(x - 1, y + 0) == "g") { setCellValue(x - 1, y + 0, "r") } else if (getCellValue(x - 1, y + 0) == "r") { setCellValue(x - 1, y + 0, "g") }
                if (getCellValue(x + 0, y - 1) == "g") { setCellValue(x + 0, y - 1, "r") } else if (getCellValue(x + 0, y - 1) == "r") { setCellValue(x + 0, y - 1, "g") }

                setCellValue(x, y, currentCell == "g" ? "r" : "g");
            }

            if (currentCell == "y") {
                const lastCell = getCellValue(width - 1, y);

                for (let index = width - 2; index >= 0; index--) {
                    setCellValue(index + 1, y, getCellValue(index, y));
                }

                setCellValue(0, y, lastCell);
            }

            renderGrid();
        }

        const renderGrid = () => {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            for (let index_h = 0; index_h < height; index_h++) {
                let row = document.createElement("div");
                row.className = "row";
                grid.appendChild(row);

                for (let index_w = 0; index_w < width; index_w++) {
                    let cell_current = grid_current[index_h][index_w];

                    let cell = document.createElement("div");
                    cell.className = "cell";
                    cell.classList += " " + cell_current;

                    cell.onclick = (_) => { cellClick(index_w, index_h); };

                    row.appendChild(cell);
                }
            }
        }

        renderGrid();
    </script>
</html>
