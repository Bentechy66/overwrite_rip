{% extends "templates/base.html" %}

{% block content %}
<div class="hero-wrap">
    <div class="center">
        <div class="hero">
            <h1 id="caret">> </h1>
            <h1 id="ow">OVERWRITE</h1>
            <h1 id="dot">.</h1>
            <h1 id="rip">RIP</h1>
            <div class="typer" id="typer"></div>
        </div>
        <div class="quote">
            <h3 id="quote"></h3>
        </div>
    </div>
</div>
<div class="badge-clip">
    <div class="badge-collection"></div>
</div>
<style>
    .badge-clip {
        position: fixed;
        left: 0;
        width: 100vw;
        overflow: hidden;
        /* pointer-events: none; */
    }

    .badge-collection {
        color: white;
        white-space: nowrap;
        will-change: transform;
        display: inline-block;
        animation: fadeDelayed 4s ease forwards;
    }

    .badge {
        margin-right: 15px;
        image-rendering: pixelated;
    }

    .badge-strip {
        display: inline-block;
    }
</style>
{% endblock %}

{% block script %}
<script>
const badgePaths = [
    {% for path in badge_paths %}
        "{{ path }}",
    {% endfor %}
]

let i = 0;

const makeBadge = (index) => {
    const src = badgePaths[index];
    const url = src.slice(0, -4);
    const el = url.includes("url_") ? document.createElement("a") : document.createElement("span");
    if (url.includes("url_")) {
        el.href = `https://${url.split("url_")[1].replaceAll('_', '.')}`;
    }
    const img = document.createElement("img");
    img.className = "badge";
    img.src = src;
    el.appendChild(img);
    return el;
};

const badge_row = document.querySelector(".badge-collection");

const prefillBadges = () => {
    badge_row.innerHTML = "";
    i = 0;

    const strip = document.createElement("span");
    strip.className = "badge-strip";
    badge_row.appendChild(strip);

    // Force into DOM so scrollWidth is measurable, then fill until it overflows
    while (strip.scrollWidth < window.innerWidth + 200) {
        strip.appendChild(makeBadge(i % badgePaths.length));
        i += 1;
    }

    const strip2 = strip.cloneNode(true);
    badge_row.appendChild(strip2);
};

const updateBadgeRowY = () => {
    const top = document.querySelector(".quote").getBoundingClientRect().bottom;
    const bottom = document.querySelector(".cookies").getBoundingClientRect().top;
    const clip = document.querySelector(".badge-clip");
    clip.style.top = (((bottom - top) / 2) + top) + "px";
};

const SCROLL_SPEED = 50;
let lastTimestamp = null;
let xPos = 0;

const updateBadgeRowPosition = (timestamp) => {
    if (document.hidden) {
        lastTimestamp = null;
        requestAnimationFrame(updateBadgeRowPosition);
        return;
    }

    if (lastTimestamp !== null) {
        const delta = (timestamp - lastTimestamp) / 1000;
        xPos -= SCROLL_SPEED * delta;
    }
    lastTimestamp = timestamp;

    const strip = badge_row.querySelector(".badge-strip");
    if (strip) {
        const stripWidth = strip.scrollWidth;
        if (xPos <= -stripWidth) {
            xPos += stripWidth;
        }
    }

    badge_row.style.transform = `translateX(${xPos}px)`;
    requestAnimationFrame(updateBadgeRowPosition);
};

updateBadgeRowY();
prefillBadges();
requestAnimationFrame(updateBadgeRowPosition);

setTimeout(() => {
    updateBadgeRowY();
}, 100)

setTimeout(() => {
    updateBadgeRowY();
}, 5000)

window.addEventListener('resize', () => {
    xPos = 0;
    lastTimestamp = null;
    updateBadgeRowY();
    prefillBadges();
});

let disclaimerFlavour = [
    "agree to live long and prosper.",
    "acquiesce to your likeness possibly being used as an NFT.",
    "agree not to give up on any challenges."
]
const disclaimer = `By visiting this site, you agree to arbitrary cookies, agree to arbitrary storage of any data sent to my server, and ${disclaimerFlavour[Math.floor(Math.random() * disclaimerFlavour.length)]}`;
document.getElementById("cookie").innerText = disclaimer;

let quotes = [
    "Love with your heart, and use your head for everything else.",
    "Insert coin to continue...",
    "Hello, friend.",
    "Engaging cyber nukes...",
    "It's an exciting time in the world right now...",
    "Dodge this.",
    "Press any key to continue...",
    "Here be dragons.",
    "Shall we play a game?",
]

document.getElementById("quote").innerText = quotes[Math.floor(Math.random() * quotes.length)];

const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';

function animateLogo() {
    const target =  "OVERWRITE"
    const dot =     "         ."
    const rip =     "          RIP"
    let i = -2;

    document.getElementById("ow").innerText = ""
    document.getElementById("dot").innerText = ""
    document.getElementById("rip").innerText = ""

    let c = setInterval(() => {
        i += 1;

        let ticker = Math.max(Math.floor(i / 1.5), 0);

        document.getElementById("ow").innerText = target.slice(0, ticker)
        document.getElementById("dot").innerText = dot.slice(0, ticker)
        document.getElementById("rip").innerText = rip.slice(0, ticker)

        if (ticker > rip.length) {
            clearInterval(c);
        }
    }, 60);
}

function killLogo() {
    document.getElementById("ow").innerText = ""
    document.getElementById("dot").innerText = ""
    document.getElementById("rip").innerText = ""
}

if (window.screen.width >= 1000) {
    animateLogo();
} else {
    killLogo();
}

let animatedLogo = false;

window.addEventListener('resize', function(event) {
    if (window.screen.width >= 1000) {
        if (!animatedLogo) {
            animateLogo();
            animatedLogo = true;
        }
    } else {
        killLogo();
        animatedLogo = false;
    }
}, true);
</script>
{% endblock %}
